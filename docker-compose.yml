version: '3.8'

services:
  # FastAPI Backend + AI RAG Pipeline
  api-server:
    build: .
    container_name: legal-ai-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=local
    volumes:
      - ./chatbot/data_laws:/app/chatbot/data_laws:ro
      - ./chatbot/index_laws:/app/chatbot/index_laws
      - ./temp_uploads:/app/temp_uploads
      - C:/Users/LENOVO/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped

  # Qdrant Vector Database (Local)
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: legal-ai-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
  # React + Vite Frontend
  frontend:
    build: ./app
    container_name: legal-ai-frontend
    ports:
      - "2000:2000"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api-server
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
